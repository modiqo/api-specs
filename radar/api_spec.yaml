  /route/match:
    post:
      operationId: routeMatch
      summary: Route match
      description: Snaps points collected along a route to roads most likely traveled.
      security:
        - publishableKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: array
                  items:
                    type: object
                    required: [coordinates]
                    properties:
                      coordinates:
                        type: string
                        description: "Format: latitude,longitude"
                      createdAt:
                        type: string
                        format: date-time
                      accuracy:
                        type: number
                mode:
                  type: string
                  enum: [car, truck, foot, bike]
                  default: car
                roadAttributes:
                  type: string
                  description: "Comma-separated: speedLimit, names, roadClass."
                units:
                  type: string
                  enum: [metric, imperial]
                  default: imperial
                geometry:
                  type: string
                  enum: [linestring, polyline5, polyline6]
                  default: polyline6
      responses:
        '200':
          description: Successful route match
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  matchedPath:
                    type: array
                    items:
                      type: object
                      properties:
                        latitude:
                          type: number
                        longitude:
                          type: number
                        originalIndex:
                          type: integer
                  roadAttributes:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoadAttribute'
                  geometry:
                    type: object
                    properties:
                      polyline:
                        type: string
                  distance:
                    type: object
                    properties:
                      value:
                        type: number
                      text:
                        type: string

  /route/directions:
    get:
      operationId: routeDirections
      summary: Directions
      description: Calculates the most efficient route between two or more locations in order.
      security:
        - publishableKey: []
      parameters:
        - name: locations
          in: query
          required: true
          schema:
            type: string
          description: "Pipe-delimited, up to 25 coordinates: lat0,lng0|lat1,lng1|..."
        - name: mode
          in: query
          schema:
            type: string
            enum: [car, truck, foot, bike]
            default: car
        - name: units
          in: query
          schema:
            type: string
            enum: [metric, imperial]
            default: imperial
        - name: avoid
          in: query
          schema:
            type: string
          description: "Comma-separated: tolls, highways, ferries, borderCrossings."
        - name: geometry
          in: query
          schema:
            type: string
            enum: [linestring, polyline5, polyline6]
            default: polyline6
        - name: departureTime
          in: query
          schema:
            type: string
            format: date-time
        - name: heading
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 360
