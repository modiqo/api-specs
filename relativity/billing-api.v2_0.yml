openapi: 3.0.4
info:
  title: Billing Insights API
  description: 'The Billing Insights API provides a REST service that allows you to retrieve billing data. With this API you can check billing metrics breakdown for instance, workspace, matter, and client. For example, you can compare billing costs like review, repo, and cold storage. You can also check peak values and current usage for the whole instance or specific workspaces. Finally, you can retrieve billing user details.'
  version: v2
  x-relativity-api-visibility: public
servers:
  - url: https://billing-insights.api.relativity.one/billing-drilldown-api
    description: Production
  - url: https://services.vaus.relativityone.us/billing-drilldown-api/
    description: Government
paths:
  /api/v2/billing-configuration/product-configurations:
    post:
      tags:
        - BillingConfiguration
      summary: Get product configuration
      description: Get product configuration for a given dates. If the requested data does not exist then 404 is returned.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetProductConfigurationRequest'
            examples:
              All product configurations for an instance:
                summary: Product configurations for an instance for a given dates
                value:
                  instanceID: f53c069b-9706-4570-8f97-be6e8fdbe156
                  dateKeys:
                    - '202308'
                    - '202307'
                  metricKey: Relativity_Translate
          text/json:
            schema:
              $ref: '#/components/schemas/GetProductConfigurationRequest'
            examples:
              All product configurations for an instance:
                summary: Product configurations for an instance for a given dates
                value:
                  instanceID: f53c069b-9706-4570-8f97-be6e8fdbe156
                  dateKeys:
                    - '202308'
                    - '202307'
                  metricKey: Relativity_Translate
          application/*+json:
            schema:
              $ref: '#/components/schemas/GetProductConfigurationRequest'
            examples:
              All product configurations for an instance:
                summary: Product configurations for an instance for a given dates
                value:
                  instanceID: f53c069b-9706-4570-8f97-be6e8fdbe156
                  dateKeys:
                    - '202308'
                    - '202307'
                  metricKey: Relativity_Translate
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/GetProductConfigurationResponse'
              example:
                results:
                  Relativity_Translate:
                    - name: ConversionRate
                      dateKey: '202308'
                      value: 20
                    - name: ConversionRate
                      dateKey: '202307'
                      value: 30
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductConfigurationResponse'
              example:
                results:
                  Relativity_Translate:
                    - name: ConversionRate
                      dateKey: '202308'
                      value: 20
                    - name: ConversionRate
                      dateKey: '202307'
                      value: 30
            text/json:
              schema:
                $ref: '#/components/schemas/GetProductConfigurationResponse'
              example:
                results:
                  Relativity_Translate:
                    - name: ConversionRate
                      dateKey: '202308'
                      value: 20
                    - name: ConversionRate
                      dateKey: '202307'
                      value: 30
